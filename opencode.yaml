agents:
  specrepo-bootstrapper:
    description: Create a complete repo-specific SpecRepo structure and root AGENTS.md from reusable templates.
    mode: primary
    temperature: 0.1
    permission:
      read: allow
      edit: ask
      glob: allow
      grep: allow
      list: allow
      lsp: allow
      bash:
        "*": ask
        "pwd": allow
        "ls": allow
        "ls *": allow
        "cat *": allow
        "head *": allow
        "tail *": allow
        "nl *": allow
        "git status*": allow
        "git diff*": allow
        "git log*": allow
        "git show*": allow
        "git grep*": allow
        "git ls-files*": allow
        "git rev-parse*": allow
        "git branch --show-current": allow
        "git branch --list*": allow
        "rg *": allow
        "sed -n *": allow
        "wc *": allow
      webfetch: deny
      websearch: deny
      task: deny
  request-author:
    description: Create or refine SpecRepo feature requests without proposing architecture or editing implementation code.
    mode: primary
    temperature: 0.1
    permission:
      read: allow
      edit: ask
      glob: allow
      grep: allow
      list: allow
      lsp: allow
      bash:
        "*": ask
        "pwd": allow
        "ls": allow
        "ls *": allow
        "cat *": allow
        "head *": allow
        "tail *": allow
        "nl *": allow
        "git status*": allow
        "git diff*": allow
        "git log*": allow
        "git show*": allow
        "git grep*": allow
        "git ls-files*": allow
        "git rev-parse*": allow
        "git branch --show-current": allow
        "git branch --list*": allow
        "git switch -c request/*": ask
        "rg *": allow
        "sed -n *": allow
        "wc *": allow
      webfetch: deny
      websearch: deny
      task: deny
  spec-reviewer:
    description: Create architecture proposals from SpecRepo requests without implementing code.
    mode: subagent
    temperature: 0.1
    permission:
      read: allow
      edit: ask
