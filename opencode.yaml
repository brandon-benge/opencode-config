        "nl *": allow
        "git status*": allow
        "git diff*": allow
        "git log*": allow
        "git show*": allow
        "git grep*": allow
        "git ls-files*": allow
        "git rev-parse*": allow
        "git branch --show-current": allow
        "git branch --list*": allow
        "rg *": allow
        "sed -n *": allow
